name: Update Bilibili Data

on:
  schedule:
    - cron: '0 */4 * * *' 
  workflow_dispatch:

jobs:
  update-process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Fetch Bilibili Data
        shell: pwsh
        env:
          BILIBILI_UID: ${{ secrets.BILIBILI_UID }}
        run: |
          $PSDefaultParameterValues['*:Encoding'] = 'utf8'
          # 执行抓取
          $a = Invoke-RestMethod "https://api.bilibili.com/x/space/bangumi/follow/list?vmid=$env:BILIBILI_UID&type=1&follow_status=0&pn=1&ps=30"
          $m = Invoke-RestMethod "https://api.bilibili.com/x/space/bangumi/follow/list?vmid=$env:BILIBILI_UID&type=2&follow_status=0&pn=1&ps=30"
          
          if ($a.code -eq 0) { $a.data.list | ConvertTo-Json -Depth 10 | Set-Content "./bangumi.json" }
          if ($m.code -eq 0) { $m.data.list | ConvertTo-Json -Depth 10 | Set-Content "./movies.json" }

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run AI Analysis
        env:
          ARK_API_KEY: ${{ secrets.ARK_API_KEY }}
          ENDPOINT_ID: ${{ secrets.ENDPOINT_ID }}
        run: |
          pip install requests
          python ai_analyze.py

      - name: Git Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          # 关键：使用 add . 自动识别所有变更
          git add .
          # 如果没有变化，commit 会失败，所以用 || exit 0 忽略它
          git commit -m "Auto update: $(date)" || exit 0
          git push
